schema_version: 1
system:
  name: example-linux
  family: linux-rhel9
  description: Generic HPC, AMD Zen3, site OpenMPI, no GPU
os:
  name: rhel
  major: 9
  minor: 4
  glibc: '2.34'
fabric:
  type: infiniband
  generation: hdr
  drivers:
  - name: rdma-core
    version: '41.0'
    prefix: /usr
  userspace:
  - name: libfabric
    version: '1.20'
    prefix: /usr
  - name: ucx
    version: '1.15'
    prefix: /usr
modules_system:
  tool: lmod
  version: '8.7'
filesystem:
  install_tree_candidates:
  - path: /shared/stack/spack/opt
    type: gpfs
    locks_honored: true
    free_gb: 30000
  source_cache_candidate: /shared/stack/spack/source-cache
  buildcache_candidate: /shared/stack/buildcache
node_types:
  login:
    role: build_host
    description: Login node
    cpu:
      detected: zen3
      preferred: zen3
      alternates:
      - zen2
    gpu: null
    build_stage:
    - path: $tempdir/$user/spack-stage
      visibility: shared
      writable: true
      throughput_class: medium
  cpu_compute:
    role: runtime
    description: Compute partition, Zen3
    cpu:
      detected: zen3
      preferred: zen3
      alternates:
      - zen2
    gpu: null
    build_stage:
    - path: /local_scratch/$user/spack-stage
      visibility: compute-only
      writable: true
      free_gb: 500
      throughput_class: fast
compiler_providers:
- name: aocc
  version: 4.2.0
  prefix: /opt/AMD/aocc-compiler-4.2.0
  provider_family: site
  languages:
  - c
  - c++
  - fortran
  modules:
  - aocc/4.2.0
- name: gcc
  version: 11.4.0
  prefix: /usr
  provider_family: system
  languages:
  - c
  - c++
  - fortran
mpi_providers:
- name: openmpi
  version: 4.1.6
  provider_family: site
  prefix: /opt/site/openmpi/4.1.6-aocc-4.2.0
  compiler: aocc@4.2.0
