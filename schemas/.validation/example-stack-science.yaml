# Canonical science-stack intent — spec-native.
#
# Minimal builds are just `name` + `specs` (or a `package_set`). The
# `class`/`toolchain`/`nodes`/`expand` fields are optional/advanced and are
# inferred from the spec + `kind` when omitted. See
# docs/spack_stack_generation_design_v6.md § stack.yaml and
# docs/stack_composer_declarative_render_alignment_v1.md.

schema_version: 1
name: science-stack

templates:
  set: v6

spack:
  version: ">=1.1.1,<1.2"

builds:
  # Curated foundation set, package-set form — no per-build ceremony.
  - name: core
    package_set: core-foundation

  # Minimal spec-native build: just specs. kind is inferred from +mpi.
  - name: mpi
    specs:
      - hdf5@1.14.5+mpi+fortran
      - netcdf-c@4.9.2+mpi

  # "A little more": an explicit kind tag, package-set reuse, and portable
  # compiler narrowing using real compiler ids (no invented toolchain name).
  - name: gpu
    kind: gpu
    package_set: science-full
    compilers: [gcc]

# System-scoped narrowing (subset semantics; ignored for other systems).
per_system:
  example-cray:
    builds:
      mpi:
        compilers: [gcc, cce]
        mpi: [cray-mpich]

# Release retention/promotion is stack-level policy, not per-build ceremony.
release:
  save_lockfiles: true
  save_manifest: true
  promotion: gated_manual
