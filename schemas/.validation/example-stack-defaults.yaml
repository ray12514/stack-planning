# Canonical stack-defaults.yaml for the v6 template set.
# Derived from docs/spack_stack_generation_design_v6.md § Stack Defaults Merge Rules.

schema_version: 1

profile_contract:
  schema_version: 1

spack:
  floor: "1.1.1"

modules:
  format: tcl
  additional_formats: []
  exposure: front_door
  init_module: cse-init
  module_root: CSE
  hierarchy_style: collapsed
  expose_provenance: true
  platform_module_policy: prereq

externals:
  compilers: prefer_platform
  mpi: prefer_platform
  openssl: system
  curl: system
  fabric_userspace: prefer_platform
  gpu_toolkit: prefer_platform

foundation_pins:
  zlib: "1.3.1"
  xz: "5.4.6"
  zstd: "1.5.6"

buildcache:
  spack_generation: "spack-{spack_version}/repo-{package_repo_generation}"
  foundation_lane: "foundation/{os_id}/glibc-{glibc}/{spack_generation}/{baseline_target}"
  payload_lane: "payload/{os_id}/glibc-{glibc}/{spack_generation}/{system}"
  signed: false
  push_after_every_step: true

release:
  save_lockfiles: true
  save_manifest: true
  retain_previous: 2
  promotion: gated_manual

helpers:
  inspector: available
  render: available
  ansible: available
