# Canonical example package-set, derived from
# docs/spack_stack_generation_design_v6.md § Package Sets reference schema (lines ~1547-1592).

schema_version: 1
name: science-full
tier: canonical
description: |
  Full curated science library set: HDF5/NetCDF/PnetCDF (multi-version),
  TAU, and performance-portability roots used by CSE payload lanes.

kinds: [serial, mpi, gpu]

specs:
  any:
    - gsl@2.8
  serial:
    - hdf5@1.14.5~mpi+fortran
    - hdf5@1.14.4~mpi+fortran
    - hdf5@1.12.3~mpi+fortran
    - netcdf-c@4.9.2~mpi
    - netcdf-c@4.9.0~mpi
  mpi:
    - hdf5@1.14.5+mpi+fortran
    - hdf5@1.14.4+mpi+fortran
    - hdf5@1.12.3+mpi+fortran
    - netcdf-c@4.9.2+mpi
    - netcdf-c@4.9.0+mpi
    - parallel-netcdf@1.13.0
    - tau+mpi
  gpu:
    - hdf5@1.14.5+mpi+fortran
    - hdf5@1.14.4+mpi+fortran
    - hdf5@1.12.3+mpi+fortran
    - netcdf-c@4.9.2+mpi
    - netcdf-c@4.9.0+mpi
    - parallel-netcdf@1.13.0
    - tau+mpi
    - kokkos+rocm
    - raja+rocm

provenance_hints:
  cray-mpich: Platform-backed
  openssl:    Site-external

notes: |
  Multi-version HDF5/NetCDF is the working target. PnetCDF stays single-version
  until the next refresh; revisit when 1.14.x lands.
